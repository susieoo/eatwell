<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EatWell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fffdf7;--surface:#fff;--surface2:#f8f5ee;--surface3:#f0eddf;
  --text:#1a1a19;--text2:#5a5a4f;--text3:#9a9a8a;--text4:#c8c8b8;
  --accent:#e85d26;--accent2:#cc4a14;--accent-soft:#fef0ea;
  --green:#3a9a5c;--green-soft:#e8f5ec;--green-dark:#2d7a48;
  --orange:#e8973a;--orange-soft:#fef5e7;
  --red:#d4483a;--red-soft:#fceae8;
  --blue:#3a6fd4;--blue-soft:#e8eff8;
  --purple:#7a4ad4;--purple-soft:#f0e8f8;
  --radius:14px;--radius-sm:10px;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  --transition:all .3s cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;
  min-height:100vh;min-height:100dvh;padding-bottom:80px;overflow-x:hidden}

/* Header */
.header{padding:52px 24px 16px;text-align:left;max-width:520px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:26px;font-weight:800;letter-spacing:-.8px;color:var(--text)}
.header h1 span{color:var(--accent)}
.lang-toggle{padding:5px 12px;border-radius:100px;border:1.5px solid var(--text4);background:none;
  font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);font-family:var(--font);transition:var(--transition)}
.lang-toggle:hover{border-color:var(--text);color:var(--text)}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px;font-weight:400;letter-spacing:.2px}
.profile-pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.profile-pill{padding:4px 12px;border-radius:100px;font-size:10px;font-weight:600;
  background:var(--surface2);color:var(--text2);letter-spacing:.3px;text-transform:uppercase}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;
  display:flex;background:rgba(255,253,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1.5px solid rgba(0,0,0,.06);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:10px 0 7px;border:none;background:none;cursor:pointer;
  font-family:var(--font);font-size:9px;font-weight:600;color:var(--text3);
  transition:var(--transition);letter-spacing:.5px;text-transform:uppercase}
.tab-btn svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.8;fill:none}
.tab-btn.active{color:var(--accent)}
.tab-btn.active svg{stroke-width:2.2}

/* Pages */
.page{display:none;padding:0 20px 24px;max-width:520px;margin:0 auto}
.page.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:10px;
  border:1.5px solid rgba(0,0,0,.05);transition:var(--transition)}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:12px}

/* Meals */
.meal-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:10px;
  border:1.5px solid rgba(0,0,0,.05)}
.meal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.meal-title{font-size:14px;font-weight:700;color:var(--text)}
.meal-time{font-size:10px;color:var(--text3);font-weight:500;margin-left:8px}
.meal-count{font-size:10px;font-weight:700;color:var(--accent);
  background:var(--accent-soft);padding:3px 10px;border-radius:100px}

/* Input */
.input-row{display:flex;gap:6px;margin-bottom:8px}
.text-input{flex:1;padding:10px 14px;border:1.5px solid var(--text4);border-radius:var(--radius-sm);
  font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg);
  outline:none;transition:var(--transition)}
.text-input:focus{border-color:var(--accent);background:var(--surface)}
.text-input::placeholder{color:var(--text4)}
.btn{padding:10px 16px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;
  cursor:pointer;transition:var(--transition);font-family:var(--font);letter-spacing:.3px}
.btn:active{transform:scale(.96)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--text4)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 14px;font-size:11px}
.btn-xs{padding:4px 10px;font-size:10px;border-radius:8px;font-weight:700}

/* Photo */
.photo-area{margin-bottom:8px}
.photo-label{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;
  border:1.5px dashed var(--text4);border-radius:var(--radius-sm);cursor:pointer;
  font-size:11px;color:var(--text3);transition:var(--transition);font-weight:500}
.photo-label:hover{border-color:var(--accent);color:var(--accent)}
.photo-label input{display:none}
.photo-label svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5}
.photo-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.photo-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumb .photo-del{position:absolute;top:-1px;right:-1px;width:20px;height:20px;
  border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;
  font-size:13px;line-height:20px;text-align:center;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s}
.photo-thumb:hover .photo-del,.photo-thumb:active .photo-del{opacity:1}
@media(hover:none){.photo-thumb .photo-del{opacity:1;background:rgba(0,0,0,.5)}}

/* Photo Recognition Modal */
.recog-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.recog-panel{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-width:520px;
  max-height:85vh;overflow-y:auto;padding:24px 20px env(safe-area-inset-bottom);
  animation:slideUp .3s ease}
.recog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.recog-header h3{font-size:16px;font-weight:800;letter-spacing:-.3px}
.recog-close{background:none;border:none;cursor:pointer;padding:4px;color:var(--text2)}
.recog-close svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.recog-photo{width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px}
.recog-status{display:flex;align-items:center;gap:8px;padding:12px;background:var(--surface2);
  border-radius:var(--radius-sm);margin-bottom:14px;font-size:12px;font-weight:600;color:var(--text2)}
.recog-spinner{width:16px;height:16px;border:2px solid var(--text4);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.recog-results{margin-bottom:14px}
.recog-results-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);margin-bottom:8px}
.recog-food-item{display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;background:var(--surface);border:1.5px solid rgba(0,0,0,.06);
  border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:var(--transition)}
.recog-food-item:hover{border-color:var(--accent)}
.recog-food-item.selected{border-color:var(--accent);background:var(--accent-soft)}
.recog-food-name{font-size:13px;font-weight:700;color:var(--text)}
.recog-food-cat{font-size:10px;color:var(--text3);margin-top:1px}
.recog-food-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--text4);
  display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.recog-food-item.selected .recog-food-check{background:var(--accent);border-color:var(--accent)}
.recog-food-item.selected .recog-food-check::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.recog-manual{margin-bottom:14px}
.recog-manual-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);margin-bottom:6px}
.recog-manual-row{display:flex;gap:6px}
.recog-manual-input{flex:1;padding:10px 14px;border:1.5px solid var(--text4);border-radius:var(--radius-sm);
  font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none}
.recog-manual-input:focus{border-color:var(--accent)}
.recog-add-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:var(--transition)}
.recog-add-btn:hover{background:var(--accent2)}
.recog-add-btn:disabled{opacity:.3;cursor:not-allowed}
.recog-confirm{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius);font-size:14px;font-weight:800;cursor:pointer;
  font-family:var(--font);transition:var(--transition)}
.recog-confirm:hover{background:var(--accent2)}
.recog-confirm:disabled{opacity:.3;cursor:not-allowed}

/* Quick foods */
.quick-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.quick-btn{padding:5px 12px;border:1.5px solid var(--surface3);border-radius:100px;
  font-size:11px;font-weight:600;background:var(--surface);cursor:pointer;
  color:var(--text2);transition:var(--transition);font-family:var(--font)}
.quick-btn:hover{border-color:var(--accent);color:var(--accent)}
.quick-btn.added{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Tags */
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
.ftag{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:100px;
  font-size:11px;font-weight:600;animation:tagPop .25s ease}
@keyframes tagPop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.ftag .x{cursor:pointer;opacity:.4;font-size:12px;transition:opacity .2s}
.ftag .x:hover{opacity:1}
.ftag-mini{display:inline-block;padding:1px 5px;border-radius:6px;font-size:9px;font-weight:600;margin-left:2px;vertical-align:middle;line-height:1.3}
.ftag-fruit{background:#fef0ea;color:#c04a20}
.ftag-vegetable{background:#e8f5ec;color:#2d7a48}
.ftag-grain{background:#fef5e7;color:#8a6020}
.ftag-protein{background:#e8eff8;color:#2a5db0}
.ftag-nut{background:#f0e8f8;color:#6a3ab0}
.ftag-beverage{background:#e8f4f8;color:#2a7a9a}
.ftag-other{background:var(--surface2);color:var(--text2)}

.meal-sub{font-size:10px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--surface2);font-weight:500}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{background:none;border:none;cursor:pointer;padding:8px;color:var(--text2);transition:var(--transition);border-radius:8px}
.cal-nav-btn:hover{background:var(--surface2);color:var(--text)}
.cal-nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.cal-month{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-weekday{text-align:center;font-size:9px;font-weight:700;color:var(--text4);
  padding:4px 0;text-transform:uppercase;letter-spacing:.8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;transition:var(--transition);position:relative;gap:2px}
.cal-day:hover{background:var(--surface2)}
.cal-day.other-month{opacity:.15}
.cal-day .day-num{font-size:12px;font-weight:600;color:var(--text);line-height:1}
.cal-day .day-dot{width:5px;height:5px;border-radius:50%}
.cal-day.today{background:var(--accent);border-radius:10px}
.cal-day.today .day-num{color:#fff}
.cal-day.selected{outline:2px solid var(--accent);outline-offset:-2px;border-radius:10px}
.cal-day.has-record .day-dot{display:block}
.cal-day:not(.has-record) .day-dot{display:none}

/* Day detail */
.day-detail{animation:fadeUp .3s ease}
.day-score-ring{display:flex;justify-content:center;margin:14px 0}
.ring-wrap{position:relative;width:84px;height:84px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:24px;font-weight:800;line-height:1}
.ring-label{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat-box{text-align:center;padding:10px 6px;background:var(--surface2);border-radius:var(--radius-sm)}
.stat-val{font-size:18px;font-weight:800;line-height:1.2}
.stat-label{font-size:9px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

.prog-item{margin-bottom:8px}
.prog-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.prog-name{font-weight:700;color:var(--text)}
.prog-val{color:var(--text3);font-weight:500}
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.def-pills{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.def-pill{padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;transition:var(--transition);letter-spacing:.2px}

.goal-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.goal-name{font-size:11px;font-weight:600;color:var(--text);min-width:72px}
.goal-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.goal-fill{height:100%;border-radius:2px;transition:width .6s ease}
.goal-count{font-size:10px;font-weight:700;min-width:28px;text-align:right}

.tips-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-top:10px;border-left:3px solid var(--accent)}
.tips-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:.3px}
.tips-item{font-size:11px;color:var(--text2);line-height:1.7}

/* Date Tab Strip */
.date-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding:2px 0}
.date-tabs::-webkit-scrollbar{display:none}
.date-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);
  border:1.5px solid transparent;background:var(--surface);min-width:52px}
.date-tab:hover{border-color:var(--text4)}
.date-tab.active{border-color:var(--accent);background:var(--accent-soft)}
.date-tab.today-tab{position:relative}
.date-tab.today-tab::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--accent)}
.date-tab .dt-weekday{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);line-height:1}
.date-tab .dt-day{font-size:16px;font-weight:800;color:var(--text);line-height:1.2}
.date-tab .dt-month{font-size:8px;font-weight:600;color:var(--text4);line-height:1}
.date-tab.active .dt-weekday{color:var(--accent)}
.date-tab.active .dt-day{color:var(--accent)}
.date-tab.active .dt-month{color:var(--accent)}
.date-tab-nav{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.date-tab-nav-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--text3);
  transition:var(--transition);border-radius:6px;display:flex;align-items:center;justify-content:center}
.date-tab-nav-btn:hover{background:var(--surface2);color:var(--text)}
.date-tab-nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.date-tab-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.3px}

/* Recommend */
.rec-section{margin-bottom:14px}
.rec-section-title{font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--text);text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rec-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--surface2)}
.rec-item:last-child{border-bottom:none}
.rec-info{flex:1}
.rec-name{font-size:13px;font-weight:700;color:var(--text)}
.rec-desc{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.5}
.rec-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.rec-pill{padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700}
.rec-add{flex-shrink:0}

.gen-btn-wrap{text-align:center;margin:20px 0 8px}
.gen-btn{padding:13px 36px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);
  transition:var(--transition);letter-spacing:.3px}
.gen-btn:hover{background:var(--accent2)}
.gen-btn:active{transform:scale(.97)}

.timeline{margin-top:12px;border-left:2px solid var(--surface3);margin-left:6px;padding-left:16px}
.tl-item{position:relative;margin-bottom:12px}
.tl-item::before{content:'';position:absolute;left:-21px;top:5px;width:7px;height:7px;
  border-radius:50%;border:2px solid var(--text4);background:var(--surface)}
.tl-item.has-food::before{background:var(--accent);border-color:var(--accent)}
.tl-label{font-size:11px;font-weight:700;color:var(--text2)}
.tl-foods{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.tl-kcal{font-size:9px;color:var(--text3);margin-top:2px;font-weight:500}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.empty p{font-size:12px;line-height:1.7}

.legend{display:flex;justify-content:center;gap:14px;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);font-weight:600}
.legend-dot{width:7px;height:7px;border-radius:50%}

/* Onboarding */
.onboard-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  overflow-y:auto;padding:0 20px env(safe-area-inset-bottom)}
.onboard-inner{max-width:460px;width:100%;padding:60px 0 40px}
.onboard-logo{text-align:center;margin-bottom:6px}
.onboard-logo h1{font-size:36px;font-weight:800;letter-spacing:-1px}
.onboard-logo h1 span{color:var(--accent)}
.onboard-welcome{text-align:center;font-size:13px;color:var(--text2);margin-bottom:32px;line-height:1.6}
.ob-section{margin-bottom:24px}
.ob-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:8px}
.ob-row{display:flex;gap:8px;flex-wrap:wrap}
.ob-choice{padding:9px 18px;border:1.5px solid var(--text4);border-radius:100px;
  font-size:12px;font-weight:600;background:var(--surface);cursor:pointer;
  color:var(--text2);transition:var(--transition);font-family:var(--font);text-align:center}
.ob-choice:hover{border-color:var(--accent);color:var(--accent)}
.ob-choice.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.ob-input{width:100%;padding:11px 14px;border:1.5px solid var(--text4);border-radius:var(--radius-sm);
  font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);
  outline:none;transition:var(--transition)}

.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--text4);border-radius:100px;

.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--text4)}

</div>

<header class="header">

</div>

</div>

// Date Tabs
// ═══════════════════════════════════════════
function getDateRange(centerDate, count){
  const dates=[];
  const today=new Date();
  today.setHours(0,0,0,0);
  for(let i=count-1;i>=0;i--){
    const d=new Date(today);
    d.setDate(d.getDate()-i);
    dates.push(toLocalDateStr(d));
  }
  return dates;
}

function formatDateTab(ds){
  const parts=ds.split('-');
  const d=new Date(+parts[0], +parts[1]-1, +parts[2]);
  const dayOfWeek=d.getDay(); // 0=Sun
  const wdIdx=dayOfWeek===0?6:dayOfWeek-1; // Mon=0...Sun=6
  const wdShort=t('dt_weekdays_short')[wdIdx];
  const dayNum=d.getDate();
  const monthShort=t('months')[d.getMonth()];
  const isToday=ds===TODAY;
  return {wdShort,dayNum,monthShort,isToday};
}

function renderDateTabsHTML(dates, activeDate, switchFn){
  let h='<div class="date-tabs">';
  dates.forEach(ds=>{
    const info=formatDateTab(ds);
    const active=ds===activeDate?'active':'';
    const todayCls=info.isToday?'today-tab':'';
    const label=info.isToday?t('dt_today'):info.wdShort;
    h+=`<div class="date-tab ${active} ${todayCls}" onclick="${switchFn}('${ds}')">
      <span class="dt-weekday">${label}</span>
      <span class="dt-day">${info.dayNum}</span>
      <span class="dt-month">${info.monthShort}</span>
    </div>`;
  });
  h+='</div>';
  return h;
}

function renderRecordDateTabs(){
  const dates=getDateRange(currentRecordDate, 7);
  const el=document.getElementById('recordDateTabs');
  el.innerHTML=renderDateTabsHTML(dates, currentRecordDate, 'switchRecordDate');
  // Scroll active tab into view — use requestAnimationFrame for reliable positioning
  requestAnimationFrame(()=>{
    const active=el.querySelector('.date-tab.active');
    if(active){
      const container=el.querySelector('.date-tabs');
      if(container){
        const offset=active.offsetLeft - container.offsetWidth/2 + active.offsetWidth/2;
        container.scrollLeft=Math.max(0, offset);
      }
    }
  });
}

function renderRecDateTabs(){
  const dates=getDateRange(currentRecDate, 7);
  const el=document.getElementById('recDateTabs');
  el.innerHTML=renderDateTabsHTML(dates, currentRecDate, 'switchRecDate');
  requestAnimationFrame(()=>{
    const active=el.querySelector('.date-tab.active');
    if(active){
      const container=el.querySelector('.date-tabs');
      if(container){
        const offset=active.offsetLeft - container.offsetWidth/2 + active.offsetWidth/2;
        container.scrollLeft=Math.max(0, offset);
      }
    }
  });
}

// Meals & State
// ═══════════════════════════════════════════
function getMeals(){return[{id:"breakfast",name:t('meal_breakfast'),time:t('meal_time_b')},{id:"lunch",name:t('meal_lunch'),time:t('meal_time_l')},{id:"snack",name:t('meal_snack'),time:t('meal_time_s')},{id:"dinner",name:t('meal_dinner'),time:t('meal_time_d')}];}
let mealRecords={breakfast:[],lunch:[],snack:[],dinner:[]};
function toLocalDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const TODAY=toLocalDateStr(new Date());
let currentRecordDate=TODAY;
let currentRecDate=TODAY; // for recommend page — synced with currentRecordDate

function loadMealsForDate(ds){
  try{const s=localStorage.getItem('ew_'+ds);if(s)return JSON.parse(s);}catch(e){}
  return {breakfast:[],lunch:[],snack:[],dinner:[]};
}
mealRecords=loadMealsForDate(TODAY);

function save(){try{localStorage.setItem('ew_'+currentRecordDate,JSON.stringify(mealRecords));}catch(e){}saveDayToHistory(currentRecordDate);}

function switchRecordDate(ds){
  // Save current before switching
  save();
  currentRecordDate=ds;
  currentRecDate=ds; // sync recommend page date
  mealRecords=loadMealsForDate(ds);
  window._ph={}; // reset photos on date switch
  renderRecordDateTabs();
  renderMeals();
}

function switchRecDate(ds){
  // Save current record before switching
  save();
  currentRecDate=ds;
  currentRecordDate=ds; // sync record page date
  mealRecords=loadMealsForDate(ds);
  window._ph={};
  renderRecDateTabs();
  renderRecommend();
}

// History
function getHistory(){try{return JSON.parse(localStorage.getItem('ew_history')||'{}');}catch(e){return {};}}
function saveDayToHistory(ds){const h=getHistory();const af=[];getMeals().forEach(m=>{let recs;if(ds===currentRecordDate)recs=mealRecords[m.id];else{try{const d=JSON.parse(localStorage.getItem('ew_'+ds)||'{}');recs=d[m.id]||[];}catch(e){recs=[];}}recs.forEach(f=>af.push(f));});if(!af.length){delete h[ds];}else{const s=calcStats(af);h[ds]={score:s.score,cal:s.totalCal,foods:af.length,names:af.map(f=>f.name)};}try{localStorage.setItem('ew_history',JSON.stringify(h));}catch(e){}}

function calcStats(af){let tc=0,tp=0,tf=0,tcar=0,tfi=0;const ad=new Set(),gc={};PROFILE.goals.forEach(g=>gc[g]=0);af.forEach(f=>{const n=f.nutrition||{};tc+=n.cal||0;tp+=n.protein||0;tf+=n.fat||0;tcar+=n.carb||0;tfi+=n.fiber||0;(n.defense||[]).forEach(d=>ad.add(d));(n.goals||[]).forEach(g=>{if(g in gc)gc[g]++;});});const pt=PROFILE.weight*1.2;const ds=Math.round((ad.size/5)*100);const gk=Object.keys(gc);const gs=gk.length?Math.round((gk.filter(g=>gc[g]>0).length/gk.length)*100):0;const sc=Math.round(ds*.3+gs*.3+Math.min(100,(tc/DAILY_CAL)*100)*.2+Math.min(100,(tp/pt)*100)*.2);return{score:sc,totalCal:tc,totalP:tp,totalF:tf,totalC:tcar,totalFiber:tfi,allDef:ad,goalCov:gc,pTarget:pt};}

  updateProfileBar();

    {kw:['核桃','杏仁','腰果','花生','瓜子','松子','榛子','夏威夷果','巴旦木','碧根果','栗子','坚果','果仁','芝麻','亚麻','葵花籽'],cat:'nut',cal:550,protein:16,fat:45,carb:20,fiber:8,defense:['dna','micro'],goals:['brain','cardiovascular'],benefits:'坚果营养',benefitsEn:'Nut nutrition'}
  ];
  for(const rule of KW_RULES){
    if(rule.kw.some(k=>name.includes(k))){
      return{cal:rule.cal,protein:rule.protein,fat:rule.fat,carb:rule.carb,fiber:rule.fiber,cat:rule.cat,defense:rule.defense,benefits:rule.benefits,benefitsEn:rule.benefitsEn,goals:rule.goals,portion:"适量",portionEn:"moderate",guessed:true};
    }

  // 3) Absolute fallback
  return{cal:80,protein:3,fat:3,carb:12,fiber:1,cat:"other",defense:['micro'],benefits:"均衡饮食的一部分",benefitsEn:"Part of a balanced diet",goals:['energy'],portion:"适量",portionEn:"moderate",guessed:true};
}

function closeRecog(){

  if(el)el.remove();
  _recogMid=null;
  _recogSelected=new Set();
}

function recognizeFood(imgData){
  // Client-side food recognition via image color/brightness analysis + common food matching
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement('canvas');
    const size=64; // downscale for analysis
    canvas.width=size;canvas.height=size;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,size,size);
    const data=ctx.getImageData(0,0,size,size).data;
    
    // Analyze color distribution
    let rSum=0,gSum=0,bSum=0,count=0;
    const colorBuckets={red:0,orange:0,yellow:0,green:0,brown:0,white:0,beige:0,pink:0,purple:0,dark:0};
    
    for(let i=0;i<data.length;i+=4){
      const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
      if(a<128)continue;
      rSum+=r;gSum+=g;bSum+=b;count++;
      const max=Math.max(r,g,b),min=Math.min(r,g,b);
      const lum=(r+g+b)/3;
      
      if(lum<50)colorBuckets.dark++;
      else if(lum>200&&max-min<30)colorBuckets.white++;
      else if(r>180&&g>150&&b>100&&max-min<60)colorBuckets.beige++;
      else if(r>150&&g<80&&b<80)colorBuckets.red++;
      else if(r>180&&g>100&&g<180&&b<80)colorBuckets.orange++;
      else if(r>180&&g>180&&b<100)colorBuckets.yellow++;
      else if(g>100&&r<g&&b<g)colorBuckets.green++;
      else if(r>100&&g<80&&b>80)colorBuckets.purple++;
      else if(r>150&&g>100&&b<100)colorBuckets.brown++;
      else if(r>180&&g>120&&b>120)colorBuckets.pink++;
    }
    
    // Normalize
    if(count>0){
      Object.keys(colorBuckets).forEach(k=>colorBuckets[k]=colorBuckets[k]/count);
    }
    
    // Score each food based on its category and typical color profile
    const foodColorMap={
      // Fruits
      "蓝莓":{colors:["purple","dark"],weight:2},
      "草莓":{colors:["red","pink"],weight:2},
      "苹果":{colors:["red","green","yellow"],weight:1.5},
      "香蕉":{colors:["yellow","beige"],weight:2},
      "番茄":{colors:["red","orange"],weight:2},
      "牛油果":{colors:["green","dark","beige"],weight:1.5},
      "橙子":{colors:["orange","yellow"],weight:2},
      "芒果":{colors:["orange","yellow"],weight:1.5},
      "西瓜":{colors:["red","green","pink"],weight:1.5},
      "石榴":{colors:["red","dark","pink"],weight:1.5},
      "猕猴桃":{colors:["green","brown","beige"],weight:1.5},
      "樱桃":{colors:["red","dark"],weight:1.5},
      "红葡萄":{colors:["purple","red","dark"],weight:1.5},
      "柠檬":{colors:["yellow"],weight:1.5},
      // Vegetables
      "西兰花":{colors:["green","dark"],weight:2},
      "菠菜":{colors:["green","dark"],weight:1.5},
      "胡萝卜":{colors:["orange"],weight:2},
      "红薯":{colors:["orange","brown","beige"],weight:1.5},
      "南瓜":{colors:["orange","yellow","beige"],weight:1.5},
      "沙拉":{colors:["green","red","yellow","white"],weight:1.5},
      "花椰菜":{colors:["white","beige","green"],weight:1.5},
      "甜椒":{colors:["red","orange","green","yellow"],weight:1.5},
      // Grains
      "米饭":{colors:["white","beige"],weight:2},
      "面条":{colors:["white","beige","yellow"],weight:1.5},
      "面包":{colors:["brown","beige","yellow"],weight:2},
      "燕麦":{colors:["beige","brown","white"],weight:1.5},
      "包子":{colors:["white","beige"],weight:1.5},
      "饺子":{colors:["white","beige"],weight:1.5},
      "炒饭":{colors:["yellow","brown","beige","orange"],weight:1.5},
      // Protein
      "三文鱼":{colors:["orange","pink","red"],weight:2},
      "鸡蛋":{colors:["white","yellow","beige","brown"],weight:2},
      "鸡胸肉":{colors:["white","beige","brown"],weight:1.5},
      "豆腐":{colors:["white","beige"],weight:1.5},
      "牛肉":{colors:["brown","red","dark"],weight:1.5},
      "虾":{colors:["pink","orange","red","white"],weight:1.5},
      // Dairy
      "酸奶":{colors:["white","beige","pink"],weight:1.5},
      "牛奶":{colors:["white"],weight:1.5},
      // Nuts
      "核桃":{colors:["brown","beige","dark"],weight:1.5},
      "杏仁":{colors:["brown","beige"],weight:1.5},
      // Beverages
      "绿茶":{colors:["green","yellow","beige"],weight:1.5},
      "咖啡":{colors:["brown","dark","beige"],weight:2},
      // Others
      "黑巧克力":{colors:["dark","brown"],weight:1.5},
      "蘑菇":{colors:["brown","beige","white"],weight:1.5},
    };
    
    const scores=[];
    for(const[fname,mapping]of Object.entries(foodColorMap)){
      let sc=0;
      mapping.colors.forEach(col=>{
        sc+=(colorBuckets[col]||0)*mapping.weight;
      });
      scores.push({name:fname,score:sc});
    }
    scores.sort((a,b)=>b.score-a.score);
    
    // Take top 4-6 candidates
    const candidates=scores.slice(0,6).filter(s=>s.score>0.02);
    
    showRecogResults(candidates);
  };
  img.src=imgData;
}

function showRecogResults(candidates){
  const statusEl=document.getElementById('recogStatus');
  const resultsEl=document.getElementById('recogResults');
  
  if(candidates.length===0){
    statusEl.innerHTML=`<span style="color:var(--text3)">${t('recog_none')}</span>`;
    resultsEl.innerHTML='';
    return;
  }
  
  statusEl.innerHTML=`<span style="color:var(--green-dark)">✓</span><span>${t('recog_found')}</span>`;
  
  let h='';
  candidates.forEach(c=>{
    const food=FOODS[c.name];
    const cat=food?catLabel(food.cat):'';
    h+=`<div class="recog-food-item" data-name="${c.name}" onclick="toggleRecogItem(this)">
      <div><div class="recog-food-name">${c.name}</div>${cat?`<div class="recog-food-cat">${cat}</div>`:''}</div>
      <div class="recog-food-check"></div>
    </div>`;
  });
  resultsEl.innerHTML=h;
  
  // Auto-select the top candidate
  const firstItem=resultsEl.querySelector('.recog-food-item');
  if(firstItem){
    firstItem.classList.add('selected');
    _recogSelected.add(firstItem.dataset.name);
    updateRecogConfirmBtn();
  }
}

function toggleRecogItem(el){
  const name=el.dataset.name;
  el.classList.toggle('selected');
  if(el.classList.contains('selected')){
    _recogSelected.add(name);
  }else{
    _recogSelected.delete(name);
  }
  updateRecogConfirmBtn();
}

function addManualRecog(){
  const inp=document.getElementById('recogManualInput');
  const raw=inp.value.trim();
  if(!raw)return;
  raw.split(/[,，、\s]+/).filter(Boolean).forEach(name=>{
    _recogSelected.add(name);
  });
  inp.value='';
  // Show added items in results
  const resultsEl=document.getElementById('recogResults');
  _recogSelected.forEach(name=>{
    if(!resultsEl.querySelector(`[data-name="${name}"]`)){
      const food=FOODS[name];
      const cat=food?catLabel(food.cat):'';
      const div=document.createElement('div');
      div.className='recog-food-item selected';
      div.dataset.name=name;
      div.onclick=function(){toggleRecogItem(this);};
      div.innerHTML=`<div><div class="recog-food-name">${name}</div>${cat?`<div class="recog-food-cat">${cat}</div>`:''}</div><div class="recog-food-check"></div>`;
      resultsEl.appendChild(div);
    }
  });
  updateRecogConfirmBtn();
}

function updateRecogConfirmBtn(){
  const btn=document.getElementById('recogConfirmBtn');
  if(btn)btn.disabled=_recogSelected.size===0;
}

function confirmRecog(){
  if(!_recogMid||_recogSelected.size===0)return;
  const mid=_recogMid;
  _recogSelected.forEach(name=>{
    if(!mealRecords[mid].some(f=>f.name===name)){
      mealRecords[mid].push({name,nutrition:FOODS[name]||guessFood(name)});
    }
  });
  save();
  renderQuick(mid);
  renderTags(mid);
  updateSub(mid);
  closeRecog();
}

function generateSummary(){save();saveDayToHistory(currentRecordDate);selectedDate=currentRecordDate;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn')[1].classList.add('active');document.getElementById('page-summary').classList.add('active');renderCalendar();}

function renderCalendar(){const container=document.getElementById('summaryContent');const history=getHistory();const wd=t('weekdays');const first=new Date(calYear,calMonth,1);let sd=first.getDay()-1;if(sd<0)sd=6;const dim=new Date(calYear,calMonth+1,0).getDate();const pd=new Date(calYear,calMonth,0).getDate();const mn=t('months');let h=`<div class="cal-nav"><button class="cal-nav-btn" onclick="navMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button><span class="cal-month">${mn[calMonth]} ${calYear}</span><button class="cal-nav-btn" onclick="navMonth(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button></div>`;h+=`<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#3a9a5c"></div>${t('legend_great')}</div><div class="legend-item"><div class="legend-dot" style="background:#e8973a"></div>${t('legend_ok')}</div><div class="legend-item"><div class="legend-dot" style="background:#d4483a"></div>${t('legend_low')}</div></div>`;h+=`<div class="cal-grid">`;wd.forEach(w=>{h+=`<div class="cal-weekday">${w}</div>`;});for(let i=sd-1;i>=0;i--)h+=`<div class="cal-day other-month"><span class="day-num">${pd-i}</span><span class="day-dot"></span></div>`;const ts=TODAY;for(let d=1;d<=dim;d++){const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const rec=history[ds];const it=ds===ts;const is=ds===selectedDate;const hr=!!rec;const sc=rec?.score||0;const dc=sc>=80?'#3a9a5c':sc>=50?'#e8973a':'#d4483a';h+=`<div class="cal-day${it?' today':''}${is?' selected':''}${hr?' has-record':''}" onclick="selectDate('${ds}')"><span class="day-num">${d}</span><span class="day-dot" style="background:${dc}"></span></div>`;}const tc2=sd+dim;const rem=tc2%7===0?0:7-tc2%7;for(let i=1;i<=rem;i++)h+=`<div class="cal-day other-month"><span class="day-num">${i}</span><span class="day-dot"></span></div>`;h+=`</div>`;h+=`<div id="dayDetail">${renderDayDetail(selectedDate)}</div>`;container.innerHTML=h;}
function navMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function selectDate(ds){selectedDate=ds;renderCalendar();}

function renderDayDetail(ds){let af=[];const mf={breakfast:[],lunch:[],snack:[],dinner:[]};if(ds===currentRecordDate){getMeals().forEach(m=>{mealRecords[m.id].forEach(f=>{af.push(f);mf[m.id].push(f);});});}else{try{const d=JSON.parse(localStorage.getItem('ew_'+ds)||'{}');getMeals().forEach(m=>{(d[m.id]||[]).forEach(f=>{af.push(f);mf[m.id].push(f);});});}catch(e){}}if(!af.length)return`<div class="card" style="text-align:center;padding:28px 20px"><div style="font-size:14px;font-weight:700;margin-bottom:3px">${ds}</div><div style="font-size:12px;color:var(--text3)">${t('no_record')}</div></div>`;const s=calcStats(af);const rc=s.score>=80?'#3a9a5c':s.score>=50?'#e8973a':'#d4483a';let h=`<div class="day-detail"><div class="card"><div style="text-align:center;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px">${ds}</div><div class="day-score-ring"><div class="ring-wrap"><svg width="84" height="84" viewBox="0 0 84 84"><circle cx="42" cy="42" r="34" fill="none" stroke="var(--surface2)" stroke-width="5"/><circle cx="42" cy="42" r="34" fill="none" stroke="${rc}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${s.score*2.14} ${214-s.score*2.14}"/></svg><div class="ring-center"><div class="ring-num" style="color:${rc}">${s.score}</div><div class="ring-label">${t('score')}</div></div></div></div><div class="stats-row"><div class="stat-box"><div class="stat-val">${Math.round(s.totalCal)}</div><div class="stat-label">kcal/${DAILY_CAL}</div></div><div class="stat-box"><div class="stat-val">${af.length}</div><div class="stat-label">${t('items')}</div></div><div class="stat-box"><div class="stat-val">${s.allDef.size}/5</div><div class="stat-label">${t('defense')}</div></div></div></div>`;h+=`<div class="card"><div class="card-label">${t('nutrients')}</div>`;[{name:t('chat_protein'),val:s.totalP,tgt:s.pTarget,u:'g',c:'#3a6fd4'},{name:t('chat_fat'),val:s.totalF,tgt:(DAILY_CAL*.3)/9,u:'g',c:'#e8973a'},{name:t('chat_carb'),val:s.totalC,tgt:(DAILY_CAL*.5)/4,u:'g',c:'#d4483a'},{name:t('chat_fiber'),val:s.totalFiber,tgt:25,u:'g',c:'#3a9a5c'}].forEach(n=>{const p=Math.min(100,(n.val/n.tgt)*100);h+=`<div class="prog-item"><div class="prog-head"><span class="prog-name">${n.name}</span><span class="prog-val">${n.val.toFixed(1)}${n.u}/${n.tgt.toFixed(0)}${n.u}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${n.c}"></div></div></div>`;});h+=`</div>`;h+=`<div class="card"><div class="card-label">${t('defense')}</div><div class="def-pills">`;['angio','regen','micro','dna','immune'].forEach(dk=>{const on=s.allDef.has(dk);h+=`<span class="def-pill" style="opacity:${on?1:.25};background:${DEF_COLORS[dk]}18;color:${DEF_COLORS[dk]}">${on?'&#10003; ':''}${defName(dk)}</span>`;});h+=`</div></div>`;h+=`<div class="card"><div class="card-label">${t('health_goals')}</div>`;Object.keys(s.goalCov).forEach(g=>{const c=s.goalCov[g];const cl=c>=3?'#3a9a5c':c>=1?'#e8973a':'#d4483a';h+=`<div class="goal-row"><span class="goal-name">${goalName(g)}</span><div class="goal-bar"><div class="goal-fill" style="width:${Math.min(100,c*25)}%;background:${cl}"></div></div><span class="goal-count" style="color:${cl}">${c}</span></div>`;});h+=`</div>`;h+=`<div class="card"><div class="card-label">${t('meals_label')}</div><div class="timeline">`;getMeals().forEach(m=>{const foods=mf[m.id];const has=foods.length>0;h+=`<div class="tl-item${has?' has-food':''}"><div class="tl-label">${m.name}</div>`;if(has){h+=`<div class="tl-foods">${foods.map(f=>{const cat=f.nutrition?.cat||'other';return`<span class="ftag ${CAT_CLS[cat]||'ftag-other'}" style="font-size:10px;padding:2px 8px">${f.name}</span>`;}).join('')}</div>`;let mc=0;foods.forEach(f=>mc+=f.nutrition?.cal||0);h+=`<div class="tl-kcal">~${Math.round(mc)} kcal</div>`;}else h+=`<div style="font-size:11px;color:var(--text4)">-</div>`;h+=`</div>`;});h+=`</div></div>`;const tips=[];if(s.totalCal<DAILY_CAL*.7)tips.push(t('tip_cal_low').replace('{cur}',Math.round(s.totalCal)).replace('{diff}',Math.round(DAILY_CAL-s.totalCal)));if(s.totalP<s.pTarget*.7)tips.push(t('tip_protein_low').replace('{cur}',s.totalP.toFixed(1)).replace('{target}',s.pTarget.toFixed(0)));if(s.totalFiber<15)tips.push(t('tip_fiber_low').replace('{cur}',s.totalFiber.toFixed(1)));if(s.allDef.size<4)tips.push(t('tip_defense_low').replace('{n}',s.allDef.size));if(!tips.length)tips.push(t('tip_great'));h+=`<div class="tips-box"><div class="tips-title">${t('suggestions')}</div>${tips.map(x=>`<div class="tips-item">· ${x}</div>`).join('')}</div></div>`;return h;}

// ═══════════════════════════════════════════
// Recommend
// ═══════════════════════════════════════════
function renderRecommend(){const c=document.getElementById('recommendContent');const goals=PROFILE.goals;const ds2={angio:1,regen:1,micro:1,dna:1,immune:1};const GDM={immunity:["immune","micro"],antioxidant:["dna","angio"],gut:["micro","regen"],cardiovascular:["angio","regen"],anticancer:["angio","dna","immune"],inflammation:["immune","angio"],brain:["regen","dna","angio"],weight:["micro","angio"],skin:["regen","immune","dna"],energy:["regen","micro"],sleep:["micro","regen"],bone:["regen","dna"]};goals.forEach(g=>(GDM[g]||[]).forEach(d=>ds2[d]+=2));
  // Load meals for currentRecDate
  const recDateMeals=currentRecDate===currentRecordDate?mealRecords:loadMealsForDate(currentRecDate);
  const eaten=new Set();getMeals().forEach(m=>(recDateMeals[m.id]||[]).forEach(f=>eaten.add(f.name)));
  const scored=[];const dayHash=simpleHash(currentRecDate);for(const[name,data]of Object.entries(FOODS)){if(!data.defense?.length)continue;let sc=0;data.defense.forEach(d=>sc+=ds2[d]||0);sc+=(data.goals||[]).filter(g=>goals.includes(g)).length*3;if(eaten.has(name))sc-=100;
  // Strong daily shuffle: use date+name hash to add significant randomization (0~15 points)
  // This ensures each day's top picks rotate meaningfully
  const nameHash=simpleHash(currentRecDate+name+dayHash);sc+=(nameHash%150)/10;
  // Category rotation: boost different categories on different days
  const cats=['fruit','vegetable','grain','protein','nut','beverage','other'];const boostIdx=dayHash%cats.length;const boostIdx2=(dayHash+3)%cats.length;if(data.cat===cats[boostIdx])sc+=6;if(data.cat===cats[boostIdx2])sc+=4;
  scored.push({name,sc,...data});}scored.sort((a,b)=>b.sc-a.sc);const cg={};['fruit','vegetable','grain','protein','nut','beverage','other'].forEach(cat=>{scored.forEach(f=>{if(f.cat===cat){if(!cg[cat])cg[cat]=[];if(cg[cat].length<4)cg[cat].push(f);}});});let h=`<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:800;letter-spacing:-.3px">${t('foryou')}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${t('foryou_sub')} · ${currentRecDate}</div></div>`;['fruit','vegetable','grain','protein','nut','beverage','other'].forEach(cat=>{const foods=cg[cat];if(!foods?.length)return;h+=`<div class="rec-section"><div class="rec-section-title">${catLabel(cat)}</div><div class="card" style="padding:3px 14px">`;foods.forEach(f=>{const ie=eaten.has(f.name);const ben=LANG==='en'?(f.benefitsEn||f.benefits):f.benefits;const por=LANG==='en'?(f.portionEn||f.portion):f.portion;h+=`<div class="rec-item" style="${ie?'opacity:.35':''}"><div class="rec-info"><div class="rec-name">${f.name}${ie?' ✓':''}</div><div class="rec-desc">${ben} · ${por||''}</div><div class="rec-pills">${(f.defense||[]).map(d=>`<span class="rec-pill" style="background:${DEF_COLORS[d]}18;color:${DEF_COLORS[d]}">${defName(d)}</span>`).join('')}${(f.goals||[]).filter(g=>goals.includes(g)).map(g=>`<span class="rec-pill" style="background:#e8f5ec;color:#2d7a48">${goalName(g)}</span>`).join('')}</div></div>${!ie?`<div class="rec-add"><button class="btn btn-outline btn-xs" onclick="recAdd('${f.name}')">+ ${t('add')}</button></div>`:''}</div>`;});h+=`</div></div>`;});h+=`<div class="tips-box"><div class="tips-title">${t('daily_tips')}</div><div class="tips-item">· ${t('tip_bmi').replace('{bmi}',BMI).replace('{status}',BMI_STATUS).replace('{cal}',DAILY_CAL)}</div><div class="tips-item">· ${t('tip_protein').replace('{target}',(PROFILE.weight*1.2).toFixed(0))}</div><div class="tips-item">· ${t('tip_variety')}</div>${BMI<18.5?`<div class="tips-item">· ${t('tip_thin')}</div>`:''}</div>`;c.innerHTML=h;}

function recAdd(name){const hour=new Date().getHours();let mid='snack';if(hour<10)mid='breakfast';else if(hour<14)mid='lunch';else if(hour<17)mid='snack';else mid='dinner';
  // If recommend page is viewing a different date than current record date, load/save that date
  if(currentRecDate===currentRecordDate){
    if(mealRecords[mid].some(f=>f.name===name))return;
    mealRecords[mid].push({name,nutrition:FOODS[name]||guessFood(name)});
    save();renderMeals();
  }else{
    const dayMeals=loadMealsForDate(currentRecDate);
    if((dayMeals[mid]||[]).some(f=>f.name===name))return;
    if(!dayMeals[mid])dayMeals[mid]=[];
    dayMeals[mid].push({name,nutrition:FOODS[name]||guessFood(name)});
    try{localStorage.setItem('ew_'+currentRecDate,JSON.stringify(dayMeals));}catch(e){}
    saveDayToHistory(currentRecDate);
  }
  renderRecommend();}
function simpleHash(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return Math.abs(h);}

// ═══════════════════════════════════════════
// Chat / Food Assistant
// ═══════════════════════════════════════════
let chatOpen=false;
function openChat(){chatOpen=true;document.getElementById('chatPanel').classList.add('open');document.getElementById('chatFab').style.display='none';if(!document.getElementById('chatMsgs').children.length){addChatMsg('bot',t('chat_welcome'));}}
function closeChat(){chatOpen=false;document.getElementById('chatPanel').classList.remove('open');document.getElementById('chatFab').style.display='flex';}
function addChatMsg(type,html){const d=document.createElement('div');d.className='chat-msg '+type;d.innerHTML=html;document.getElementById('chatMsgs').appendChild(d);d.scrollIntoView({behavior:'smooth'});}
function sendChat(){const inp=document.getElementById('chatInput');const q=inp.value.trim();if(!q)return;inp.value='';sendChatMsg(q);}
function sendChatMsg(q){addChatMsg('user',q);setTimeout(()=>processChat(q),200);}

function processChat(q){
  // Find food
  let food=null,fname=q.trim();
  if(FOODS[fname])food=FOODS[fname];
  else{for(const k of Object.keys(FOODS)){if(k.includes(fname)||fname.includes(k)){food=FOODS[k];fname=k;break;}}}
  if(!food){addChatMsg('bot',t('chat_not_found').replace('{name}',q));return;}

  const ben=LANG==='en'?(food.benefitsEn||food.benefits):food.benefits;
  const por=LANG==='en'?(food.portionEn||food.portion):food.portion;
  const cau=LANG==='en'?(food.cautionEn||food.caution||t('caution_none')):(food.caution||t('caution_none'));
  const freqMap={daily:t('freq_daily'),often:t('freq_often'),moderate:t('freq_moderate')};
  const freq=freqMap[food.freq]||freqMap.often;
  const matchGoals=(food.goals||[]).filter(g=>PROFILE.goals.includes(g));

  let h=`<div class="food-card">`;
  h+=`<div class="fc-name">${fname}</div>`;
  h+=`<div class="fc-row"><span>${t('chat_cal')}</span><span>${food.cal} kcal</span></div>`;
  h+=`<div class="fc-row"><span>${t('chat_protein')}</span><span>${food.protein}g</span></div>`;
  h+=`<div class="fc-row"><span>${t('chat_fat')}</span><span>${food.fat}g</span></div>`;
  h+=`<div class="fc-row"><span>${t('chat_carb')}</span><span>${food.carb}g</span></div>`;
  h+=`<div class="fc-row"><span>${t('chat_fiber')}</span><span>${food.fiber}g</span></div>`;
  h+=`<div class="fc-row"><span>${t('chat_portion')}</span><span>${por}</span></div>`;
  h+=`<div class="fc-section"><div class="fc-section-title">${t('chat_benefits')}</div><div class="fc-text">${ben}</div></div>`;
  if(food.defense?.length){h+=`<div class="fc-section"><div class="fc-section-title">${t('chat_defense')}</div><div class="fc-tags">${food.defense.map(d=>`<span class="fc-tag" style="background:${DEF_COLORS[d]}18;color:${DEF_COLORS[d]}">${defName(d)}</span>`).join('')}</div></div>`;}
  if(matchGoals.length){h+=`<div class="fc-section"><div class="fc-section-title">${t('chat_goals_match')}</div><div class="fc-tags">${matchGoals.map(g=>`<span class="fc-tag" style="background:#e8f5ec;color:#2d7a48">${goalName(g)}</span>`).join('')}</div></div>`;}
  h+=`<div class="fc-section"><div class="fc-section-title">${t('chat_freq')}</div><div class="fc-text">${freq}</div></div>`;
  h+=`<div class="fc-section"><div class="fc-section-title">${t('chat_caution')}</div><div class="fc-text">${cau}</div></div>`;
  h+=`</div>`;
  addChatMsg('bot',h);
}

init();
