<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EatWell - 智能饮食记录与推荐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#16a34a;--green-light:#f0fdf4;--green-dark:#15803d;
  --orange:#ea580c;--orange-light:#fff7ed;
  --blue:#2563eb;--blue-light:#eff6ff;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --red:#dc2626;--gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;
  --gray400:#94a3b8;--gray500:#64748b;--gray600:#475569;--gray800:#1e293b;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:#f0fdf4;color:var(--gray800);line-height:1.6;min-height:100vh;padding-bottom:80px}
.app-header{background:linear-gradient(135deg,#15803d,#16a34a,#059669);
  padding:20px 16px 16px;color:#fff;text-align:center;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(21,128,61,.3)}
.app-header h1{font-size:20px;font-weight:700;letter-spacing:.5px}
.app-header .sub{font-size:12px;opacity:.8;margin-top:2px}
.profile-bar{display:flex;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.profile-tag{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:11px;backdrop-filter:blur(4px)}
/* Tabs */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid var(--gray100);position:sticky;top:76px;z-index:99}
.tab-btn{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:600;color:var(--gray500);
  border:none;background:none;cursor:pointer;position:relative;transition:.2s}
.tab-btn.active{color:var(--green)}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:20%;width:60%;height:3px;
  background:var(--green);border-radius:2px}
.tab-btn .tab-icon{font-size:18px;display:block;margin-bottom:2px}
/* Pages */
.page{display:none;padding:16px;max-width:640px;margin:0 auto}
.page.active{display:block}
/* Cards */
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
/* Meal record */
.meal-section{margin-bottom:20px}
.meal-label{font-size:14px;font-weight:600;color:var(--green-dark);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.meal-input-area{display:flex;gap:8px;margin-bottom:8px}
.meal-input-area input{flex:1;padding:10px 14px;border:2px solid var(--gray200);border-radius:10px;font-size:14px;
  outline:none;transition:.2s}
.meal-input-area input:focus{border-color:var(--green)}
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn:active{transform:scale(.96)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:var(--green-dark)}
.btn-outline{background:#fff;color:var(--green);border:2px solid var(--green)}
.btn-orange{background:var(--orange);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
/* Photo upload */
.photo-upload{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.photo-upload label{display:flex;align-items:center;gap:4px;padding:8px 14px;border:2px dashed var(--gray200);
  border-radius:10px;cursor:pointer;font-size:13px;color:var(--gray500);transition:.2s}
.photo-upload label:hover{border-color:var(--green);color:var(--green)}
.photo-upload input{display:none}
.photo-preview{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.photo-preview img{width:60px;height:60px;object-fit:cover;border-radius:8px;border:2px solid var(--gray100)}
/* Food tags */
.food-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.food-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;
  font-weight:500;animation:tagIn .3s ease}
.food-tag .remove{cursor:pointer;opacity:.6;font-size:14px;margin-left:2px}
.food-tag .remove:hover{opacity:1}
@keyframes tagIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.tag-fruit{background:#fef2f2;color:#dc2626}
.tag-vegetable{background:#f0fdf4;color:#16a34a}
.tag-grain{background:#fefce8;color:#a16207}
.tag-protein{background:#eff6ff;color:#2563eb}
.tag-nut{background:#fdf4ff;color:#9333ea}
.tag-beverage{background:#f0f9ff;color:#0284c7}
.tag-other{background:#f8fafc;color:#475569}
/* Summary */
.summary-header{text-align:center;padding:16px;background:linear-gradient(135deg,var(--green-light),var(--blue-light));
  border-radius:var(--radius);margin-bottom:14px}
.cal-big{font-size:36px;font-weight:800;color:var(--green-dark)}
.cal-unit{font-size:14px;color:var(--gray500)}
.cal-target{font-size:12px;color:var(--gray500);margin-top:4px}
.nutrient-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.nutrient-item{text-align:center;padding:12px 8px;background:var(--gray50);border-radius:10px}
.nutrient-val{font-size:18px;font-weight:700;color:var(--gray800)}
.nutrient-label{font-size:11px;color:var(--gray500);margin-top:2px}
.nutrient-bar{height:4px;background:var(--gray100);border-radius:2px;margin-top:6px;overflow:hidden}
.nutrient-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
/* Defense system */
.defense-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0}
.defense-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
/* Meal timeline */
.meal-timeline{border-left:3px solid var(--gray100);margin-left:12px;padding-left:16px}
.meal-timeline-item{position:relative;margin-bottom:16px}
.meal-timeline-item::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;
  border-radius:50%;border:2px solid var(--green);background:#fff}
.meal-timeline-item.has-food::before{background:var(--green)}
.meal-time-label{font-size:13px;font-weight:600;color:var(--gray600)}
.meal-food-list{font-size:13px;color:var(--gray500);margin-top:4px}
/* Recommendation page */
.rec-card{background:#fff;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.rec-card-header{padding:14px 16px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.rec-food-item{padding:12px 16px;border-top:1px solid var(--gray100);display:flex;flex-direction:column;gap:4px}
.rec-food-name{font-size:14px;font-weight:600}
.rec-food-benefit{font-size:12px;color:var(--gray500)}
.rec-food-tags{display:flex;flex-wrap:wrap;gap:4px}
.rec-food-tags span{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
/* Score ring */
.score-ring-wrap{display:flex;justify-content:center;margin:16px 0}
.score-ring{position:relative;width:100px;height:100px}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring-val{font-size:28px;font-weight:800;color:var(--green-dark)}
.score-ring-label{font-size:10px;color:var(--gray500)}
/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray400)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
/* Analysis badge */
.analysis-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:2px}
.badge-good{background:#dcfce7;color:#16a34a}
.badge-warn{background:#fef3c7;color:#d97706}
.badge-low{background:#fee2e2;color:#dc2626}
/* Quick add */
.quick-foods{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.quick-food-btn{padding:5px 12px;border:1.5px solid var(--gray200);border-radius:20px;font-size:12px;
  background:#fff;cursor:pointer;transition:.2s;color:var(--gray600)}
.quick-food-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
.quick-food-btn.added{border-color:var(--green);background:var(--green);color:#fff}
/* Section divider */
.section-divider{height:1px;background:var(--gray100);margin:16px 0}
/* Tips */
.tip-box{background:var(--orange-light);border-radius:10px;padding:12px 14px;margin-top:12px;font-size:12px;color:var(--gray600)}
.tip-box strong{color:var(--orange)}
/* Loading */
.analyzing{text-align:center;padding:20px;color:var(--gray500);font-size:14px}
.analyzing .spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--gray200);
  border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* Responsive */
@media(max-width:380px){
  .nutrient-grid{grid-template-columns:repeat(2,1fr)}
  .profile-tag{font-size:10px;padding:2px 8px}
}
</style>
</head>

<header class="app-header">

  </div>
</div>

<div class="page" id="page-summary">

</div>

<!-- ====== 推荐页 ====== -->
<div class="page" id="page-recommend">

// 尝试从 localStorage 恢复今天的数据
const TODAY = new Date().toISOString().slice(0,10);
try {
  const saved = localStorage.getItem('eatwell_'+TODAY);
  if(saved) mealRecords = JSON.parse(saved);
} catch(e){}

function saveRecords(){
  try{ localStorage.setItem('eatwell_'+TODAY, JSON.stringify(mealRecords)); }catch(e){}
}

// 初始化
// ═══════════════════════════════════════════════
function init(){
  // Profile bar
  const gStr = PROFILE.gender==='female'?'女':'男';
  const goalsStr = PROFILE.goals.map(g=>GOAL_NAMES[g]||g).join(' · ');
  document.getElementById('profileBar').innerHTML = `
    <span class="profile-tag">${gStr} ${PROFILE.age}岁</span>
    <span class="profile-tag">${PROFILE.height}cm / ${PROFILE.weight}kg</span>
    <span class="profile-tag">BMI ${BMI}(${BMI_STATUS})</span>
    <span class="profile-tag">🎯 ${goalsStr}</span>
  `;
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('page-'+btn.dataset.page).classList.add('active');
      if(btn.dataset.page==='recommend') renderRecommendations();
    };
  });
  renderMealSections();
  renderRecommendations();
}

function renderMealSections(){
  const container = document.getElementById('mealSections');
  container.innerHTML = MEALS.map(meal=>`
    <div class="card meal-section">
      <div class="meal-label">${meal.emoji} ${meal.name} <span style="font-weight:400;color:var(--gray400);font-size:12px">${meal.time}</span></div>
      
      <!-- 照片上传 -->
      <div class="photo-upload">
        <label><span>📷</span> 拍照/上传食物照片
          <input type="file" accept="image/*" capture="environment" multiple onchange="handlePhoto('${meal.id}',this)">
        </label>
      </div>
      <div class="photo-preview" id="photos-${meal.id}"></div>

      <!-- 文字输入 -->
      <div class="meal-input-area">
        <input type="text" id="input-${meal.id}" placeholder="输入食物名称，如：蓝莓、鸡蛋、燕麦…" 
          onkeydown="if(event.key==='Enter')addFood('${meal.id}')">
        <button class="btn btn-green btn-sm" onclick="addFood('${meal.id}')">添加</button>
      </div>

      <!-- 快速添加 -->
      <div class="quick-foods" id="quick-${meal.id}"></div>

      <!-- 已添加食物标签 -->
      <div class="food-tags" id="tags-${meal.id}"></div>

      <!-- 该餐小计 -->
      <div id="meal-subtotal-${meal.id}" style="margin-top:10px;font-size:12px;color:var(--gray500)"></div>
    </div>
  `).join('');

  // 渲染快捷食物和已有标签
  MEALS.forEach(meal=>{
    renderQuickFoods(meal.id);
    renderFoodTags(meal.id);
    renderPhotoPreviews(meal.id);
    updateMealSubtotal(meal.id);
  });
}

function getQuickFoodsForMeal(mealId){
  const map = {
    breakfast:["鸡蛋","牛奶","燕麦","面包","香蕉","酸奶","蓝莓","豆浆","包子"],
    lunch:["米饭","鸡胸肉","西兰花","番茄","豆腐","菠菜","三文鱼","面条"],
    snack:["苹果","核桃","绿茶","黑巧克力","杏仁","酸奶","蜂蜜","咖啡"],
    dinner:["糙米","虾","芦笋","红薯","秋葵","豆腐","鸡蛋","沙拉"],
  };
  return map[mealId]||[];
}

function renderQuickFoods(mealId){
  const el = document.getElementById('quick-'+mealId);
  const added = mealRecords[mealId].map(f=>f.name);
  el.innerHTML = getQuickFoodsForMeal(mealId).map(name=>{
    const isAdded = added.includes(name);
    return `<button class="quick-food-btn ${isAdded?'added':''}" onclick="toggleQuickFood('${mealId}','${name}')">${name}</button>`;
  }).join('');
}

function toggleQuickFood(mealId, name){
  const idx = mealRecords[mealId].findIndex(f=>f.name===name);
  if(idx>=0){
    mealRecords[mealId].splice(idx,1);
  } else {
    const nutr = FOOD_NUTRITION[name]||guessNutrition(name);
    mealRecords[mealId].push({name, nutrition:nutr});
  }
  saveRecords();
  renderQuickFoods(mealId);
  renderFoodTags(mealId);
  updateMealSubtotal(mealId);
}

function addFood(mealId){
  const input = document.getElementById('input-'+mealId);
  const raw = input.value.trim();
  if(!raw) return;
  // 支持逗号、顿号、空格分隔
  const names = raw.split(/[,，、\s]+/).filter(Boolean);
  names.forEach(name=>{
    if(mealRecords[mealId].some(f=>f.name===name)) return;
    const nutr = FOOD_NUTRITION[name]||guessNutrition(name);
    mealRecords[mealId].push({name, nutrition:nutr});
  });
  input.value='';
  saveRecords();
  renderQuickFoods(mealId);
  renderFoodTags(mealId);
  updateMealSubtotal(mealId);
}

function removeFood(mealId, idx){
  mealRecords[mealId].splice(idx,1);
  saveRecords();
  renderQuickFoods(mealId);
  renderFoodTags(mealId);
  updateMealSubtotal(mealId);
}

function guessNutrition(name){
  // 模糊匹配
  const keys = Object.keys(FOOD_NUTRITION);
  for(const k of keys){
    if(name.includes(k)||k.includes(name)) return {...FOOD_NUTRITION[k], matchedAs:k};
  }
  return {cal:80,protein:3,fat:3,carb:12,fiber:1,cat:"other",defense:[],benefits:"",goals:[],portion:"适量",unknown:true};
}

function renderFoodTags(mealId){
  const el = document.getElementById('tags-'+mealId);
  el.innerHTML = mealRecords[mealId].map((food,i)=>{
    const cat = food.nutrition?.cat||'other';
    const style = CAT_STYLES[cat]||CAT_STYLES.other;
    const unknownMark = food.nutrition?.unknown ? ' ❓':'';
    return `<span class="food-tag ${style.cls}">${style.label} · ${food.name}${unknownMark}<span class="remove" onclick="removeFood('${mealId}',${i})">×</span></span>`;
  }).join('');
}

function updateMealSubtotal(mealId){
  const el = document.getElementById('meal-subtotal-'+mealId);
  const foods = mealRecords[mealId];
  if(!foods.length){ el.innerHTML=''; return; }
  let cal=0,p=0,f=0,c=0;
  foods.forEach(food=>{
    const n = food.nutrition||{};
    cal+=n.cal||0; p+=n.protein||0; f+=n.fat||0; c+=n.carb||0;
  });
  el.innerHTML = `<strong>${foods.length}种食物</strong> · 约 ${Math.round(cal)} kcal · 蛋白质${p.toFixed(1)}g · 脂肪${f.toFixed(1)}g · 碳水${c.toFixed(1)}g`;
}

// Photo handling
function handlePhoto(mealId, input){
  const files = input.files;
  if(!files.length) return;
  for(const file of files){
    const reader = new FileReader();
    reader.onload = e=>{
      if(!mealRecords[mealId]._photos) mealRecords[mealId]._photos=[];
      // Store as a separate array since food photos are supplementary
      if(!window._photos) window._photos={};
      if(!window._photos[mealId]) window._photos[mealId]=[];
      window._photos[mealId].push(e.target.result);
      renderPhotoPreviews(mealId);
    };
    reader.readAsDataURL(file);
  }
}

function renderPhotoPreviews(mealId){
  const el = document.getElementById('photos-'+mealId);
  const photos = (window._photos&&window._photos[mealId])||[];
  el.innerHTML = photos.map(src=>`<img src="${src}" alt="food">`).join('');
}

// ═══════════════════════════════════════════════
// 总结页
// ═══════════════════════════════════════════════
function generateSummary(){
  // Switch to summary tab
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  document.getElementById('page-summary').classList.add('active');

  const container = document.getElementById('summaryContent');

  // Collect all foods
  let allFoods=[];
  MEALS.forEach(m=>{
    mealRecords[m.id].forEach(f=>{
      allFoods.push({...f, meal:m.id, mealName:m.name, mealEmoji:m.emoji});
    });
  });

  if(!allFoods.length){
    container.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>还没有记录今天的饮食<br>去"记录"页添加食物后生成总结吧</p></div>`;
    return;
  }

  // Calculate totals
  let totalCal=0,totalP=0,totalF=0,totalC=0,totalFiber=0;
  let allDefenses = new Set();
  let goalCoverage = {};
  PROFILE.goals.forEach(g=>goalCoverage[g]=0);

  allFoods.forEach(f=>{
    const n=f.nutrition||{};
    totalCal+=n.cal||0; totalP+=n.protein||0; totalF+=n.fat||0; totalC+=n.carb||0; totalFiber+=n.fiber||0;
    (n.defense||[]).forEach(d=>allDefenses.add(d));
    (n.goals||[]).forEach(g=>{if(g in goalCoverage) goalCoverage[g]++});
  });

  // Nutrient quality scores
  const calPct = Math.min(100, (totalCal/DAILY_CAL_TARGET)*100);
  const proteinTarget = PROFILE.weight * 1.2; // g
  const fiberTarget = 25;
  const proteinPct = Math.min(100,(totalP/proteinTarget)*100);
  const fiberPct = Math.min(100,(totalFiber/fiberTarget)*100);

  // Defense coverage
  const defenseCount = allDefenses.size;
  const defenseScore = Math.round((defenseCount/5)*100);

  // Goal coverage score
  const goalKeys = Object.keys(goalCoverage);
  const goalScore = goalKeys.length ? Math.round((goalKeys.filter(g=>goalCoverage[g]>0).length/goalKeys.length)*100) : 0;

  // Overall score
  const overallScore = Math.round(defenseScore*0.3 + goalScore*0.3 + Math.min(100,calPct)*0.2 + proteinPct*0.2);

  // HTML
  let html = '';

  // Score ring
  html += `
  <div class="summary-header">
    <div style="font-size:13px;color:var(--gray600);margin-bottom:8px">📅 ${TODAY} 饮食总结</div>
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#e2e8f0" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="${overallScore>=80?'#16a34a':overallScore>=60?'#d97706':'#dc2626'}" 
            stroke-width="8" stroke-linecap="round"
            stroke-dasharray="${overallScore*2.64} ${264-overallScore*2.64}"/>
        </svg>
        <div class="score-ring-text">
          <div class="score-ring-val">${overallScore}</div>
          <div class="score-ring-label">综合评分</div>
        </div>
      </div>
    </div>
  </div>`;

  // Calories
  html += `
  <div class="card">
    <div class="card-title">🔥 热量摄入</div>
    <div style="text-align:center;margin-bottom:12px">
      <span class="cal-big">${Math.round(totalCal)}</span>
      <span class="cal-unit">kcal</span>
      <div class="cal-target">每日建议 ${DAILY_CAL_TARGET} kcal（BMI ${BMI} ${BMI_STATUS}）</div>
    </div>
    <div class="nutrient-bar" style="height:8px;border-radius:4px;margin-bottom:4px">
      <div class="nutrient-bar-fill" style="width:${calPct}%;background:${calPct>110?'#dc2626':calPct>90?'#16a34a':calPct>60?'#d97706':'#dc2626'};border-radius:4px"></div>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--gray500)">
      ${calPct>=90&&calPct<=110?'<span class="analysis-badge badge-good">热量达标</span>':
        calPct<60?'<span class="analysis-badge badge-low">热量不足，建议增加摄入</span>':
        calPct<90?'<span class="analysis-badge badge-warn">热量偏低</span>':
        '<span class="analysis-badge badge-warn">热量偏高</span>'}
    </div>
  </div>`;

  // Macronutrients
  html += `
  <div class="card">
    <div class="card-title">📐 营养素分析</div>
    <div class="nutrient-grid">
      <div class="nutrient-item">
        <div class="nutrient-val" style="color:#2563eb">${totalP.toFixed(1)}g</div>
        <div class="nutrient-label">蛋白质</div>
        <div class="nutrient-bar"><div class="nutrient-bar-fill" style="width:${proteinPct}%;background:#2563eb"></div></div>
        <div style="font-size:10px;color:var(--gray400);margin-top:2px">目标${proteinTarget.toFixed(0)}g</div>
      </div>
      <div class="nutrient-item">
        <div class="nutrient-val" style="color:#ea580c">${totalF.toFixed(1)}g</div>
        <div class="nutrient-label">脂肪</div>
        <div class="nutrient-bar"><div class="nutrient-bar-fill" style="width:${Math.min(100,totalF/((DAILY_CAL_TARGET*0.3)/9)*100)}%;background:#ea580c"></div></div>
      </div>
      <div class="nutrient-item">
        <div class="nutrient-val" style="color:#d97706">${totalC.toFixed(1)}g</div>
        <div class="nutrient-label">碳水化合物</div>
        <div class="nutrient-bar"><div class="nutrient-bar-fill" style="width:${Math.min(100,totalC/((DAILY_CAL_TARGET*0.5)/4)*100)}%;background:#d97706"></div></div>
      </div>
      <div class="nutrient-item">
        <div class="nutrient-val" style="color:#16a34a">${totalFiber.toFixed(1)}g</div>
        <div class="nutrient-label">膳食纤维</div>
        <div class="nutrient-bar"><div class="nutrient-bar-fill" style="width:${fiberPct}%;background:#16a34a"></div></div>
        <div style="font-size:10px;color:var(--gray400);margin-top:2px">目标25g</div>
      </div>
      <div class="nutrient-item">
        <div class="nutrient-val" style="color:#7c3aed">${allFoods.length}</div>
        <div class="nutrient-label">食物种类</div>
      </div>
      <div class="nutrient-item">
        <div class="nutrient-val" style="color:#dc2626">${defenseCount}/5</div>
        <div class="nutrient-label">防御系统</div>
      </div>
    </div>
  </div>`;

  // Defense systems coverage
  html += `
  <div class="card">
    <div class="card-title">🛡️ 五大防御系统覆盖</div>
    <div class="defense-grid">`;
  for(const[dk,dn] of Object.entries(DEFENSE_NAMES)){
    const active = allDefenses.has(dk);
    html += `<span class="defense-badge" style="opacity:${active?1:.3};background:${DEFENSE_COLORS[dk]}18;color:${DEFENSE_COLORS[dk]}">${active?'✓ ':''}${dn}</span>`;
  }
  html += `</div>`;
  if(defenseCount<5){
    const missing = Object.entries(DEFENSE_NAMES).filter(([k])=>!allDefenses.has(k)).map(([,v])=>v);
    html += `<div style="text-align:center;font-size:12px;color:var(--gray500);margin-top:8px">未覆盖：${missing.join('、')} — 试试在推荐页找到补充食物</div>`;
  }
  html += `</div>`;

  // Goal coverage
  html += `
  <div class="card">
    <div class="card-title">🎯 健康目标达成</div>`;
  goalKeys.forEach(g=>{
    const count = goalCoverage[g];
    const level = count>=3?'good':count>=1?'warn':'low';
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:13px;min-width:90px">${GOAL_NAMES[g]}</span>
      <div style="flex:1;height:6px;background:var(--gray100);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,count*25)}%;background:${level==='good'?'#16a34a':level==='warn'?'#d97706':'#dc2626'};border-radius:3px;transition:width .6s"></div>
      </div>
      <span class="analysis-badge badge-${level}">${count}种食物</span>
    </div>`;
  });
  html += `</div>`;

  // Meal timeline
  html += `
  <div class="card">
    <div class="card-title">🕐 今日饮食时间线</div>
    <div class="meal-timeline">`;
  MEALS.forEach(m=>{
    const foods = mealRecords[m.id];
    html += `<div class="meal-timeline-item ${foods.length?'has-food':''}">
      <div class="meal-time-label">${m.emoji} ${m.name}</div>`;
    if(foods.length){
      html += `<div class="food-tags" style="margin-top:6px">`;
      foods.forEach(f=>{
        const cat=f.nutrition?.cat||'other';
        const style=CAT_STYLES[cat]||CAT_STYLES.other;
        html += `<span class="food-tag ${style.cls}">${f.name}</span>`;
      });
      html += `</div>`;
      let mc=0; foods.forEach(f=>mc+=f.nutrition?.cal||0);
      html += `<div style="font-size:11px;color:var(--gray400);margin-top:4px">约 ${Math.round(mc)} kcal</div>`;
    } else {
      html += `<div class="meal-food-list">未记录</div>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;

  // Personalized tips
  html += `
  <div class="tip-box">
    <strong>💡 个性化建议</strong><br>`;
  const tips = [];
  if(totalCal < DAILY_CAL_TARGET*0.7) tips.push(`今日热量仅 ${Math.round(totalCal)} kcal，距目标差 ${Math.round(DAILY_CAL_TARGET-totalCal)} kcal。BMI ${BMI} 偏瘦，建议增加坚果、牛油果等高热量营养食物。`);
  if(totalP < proteinTarget*0.7) tips.push(`蛋白质摄入偏低（${totalP.toFixed(1)}g / 目标${proteinTarget.toFixed(0)}g），建议补充鸡蛋、鱼虾或豆类。`);
  if(totalFiber < 15) tips.push(`膳食纤维仅 ${totalFiber.toFixed(1)}g，建议增加全谷物、蔬菜和水果。`);
  if(defenseCount < 4) tips.push(`今日仅覆盖 ${defenseCount}/5 个防御系统，试试添加更多种类的食物来提升全面防护。`);
  if(!tips.length) tips.push('今天的饮食搭配非常棒！继续保持多样化的饮食习惯。');
  tips.forEach(t=>{ html += `<div style="margin-top:6px">• ${t}</div>`; });
  html += `</div>`;

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════
// 推荐页
// ═══════════════════════════════════════════════
function renderRecommendations(){
  const container = document.getElementById('recommendContent');
  const goals = PROFILE.goals;

  // Build scores similar to Python script
  const defenseScores = {angio:1,regen:1,micro:1,dna:1,immune:1};
  const GOAL_DEFENSE_MAP = {
    immunity:["immune","micro"],antioxidant:["dna","angio"],gut:["micro","regen"],
    cardiovascular:["angio","regen"],anticancer:["angio","dna","immune"],inflammation:["immune","angio"],
    brain:["regen","dna","angio"],weight:["micro","angio"],skin:["regen","immune","dna"],
    energy:["regen","micro"],sleep:["micro","regen"],bone:["regen","dna"]
  };
  goals.forEach(g=>(GOAL_DEFENSE_MAP[g]||[]).forEach(d=>defenseScores[d]+=2));
  if(BMI<18.5){defenseScores.regen+=2;defenseScores.micro+=2;defenseScores.immune+=1;}

  // Collect already-eaten foods today
  const eaten = new Set();
  MEALS.forEach(m=>mealRecords[m.id].forEach(f=>eaten.add(f.name)));

  // Score all foods
  const scored = [];
  for(const[name,data] of Object.entries(FOOD_NUTRITION)){
    if(!data.defense||!data.defense.length) continue; // skip basic foods
    let score=0;
    data.defense.forEach(d=>score+=defenseScores[d]||0);
    const goalMatch = (data.goals||[]).filter(g=>goals.includes(g)).length;
    score += goalMatch*3;
    if(eaten.has(name)) score -= 10; // already eaten today
    // Add seeded randomness based on date
    const hash = simpleHash(TODAY+name);
    score += (hash%40)/10;
    scored.push({name,score,...data});
  }
  scored.sort((a,b)=>b.score-a.score);

  // Group by category
  const catGroups = {};
  const catOrder = ['fruit','vegetable','grain','protein','nut','beverage','other'];
  const catEmojis = {fruit:'🍎',vegetable:'🥬',grain:'🌾',protein:'🥩',nut:'🥜',beverage:'🍵',other:'✨'};
  const catNames = {fruit:'水果推荐',vegetable:'蔬菜推荐',grain:'谷物豆类推荐',protein:'蛋白质推荐',nut:'坚果种子推荐',beverage:'饮品推荐',other:'超级食物推荐'};

  scored.forEach(f=>{
    if(!catGroups[f.cat]) catGroups[f.cat]=[];
    if(catGroups[f.cat].length<4) catGroups[f.cat].push(f);
  });

  let html = `
  <div style="text-align:center;padding:12px;margin-bottom:14px">
    <div style="font-size:18px;font-weight:700;color:var(--green-dark)">💡 今日个性化推荐</div>
    <div style="font-size:12px;color:var(--gray500);margin-top:4px">基于你的健康档案和目标定制 · ${TODAY}</div>
  </div>`;

  // Missing defenses hint
  const eatenDefenses = new Set();
  eaten.forEach(name=>{const d=FOOD_NUTRITION[name]; if(d)(d.defense||[]).forEach(x=>eatenDefenses.add(x));});
  const missingDef = Object.entries(DEFENSE_NAMES).filter(([k])=>!eatenDefenses.has(k));
  if(missingDef.length>0 && eaten.size>0){
    html += `<div class="card" style="background:var(--orange-light)">
      <div style="font-size:13px;color:var(--orange);font-weight:600;margin-bottom:4px">⚡ 今日饮食缺少的防御系统</div>
      <div class="defense-grid" style="justify-content:flex-start">${missingDef.map(([k,v])=>`<span class="defense-badge" style="background:${DEFENSE_COLORS[k]}18;color:${DEFENSE_COLORS[k]}">${v}</span>`).join('')}</div>
      <div style="font-size:12px;color:var(--gray600);margin-top:6px">以下推荐优先补充这些防御系统的食物</div>
    </div>`;
  }

  catOrder.forEach(cat=>{
    const foods = catGroups[cat];
    if(!foods||!foods.length) return;
    html += `<div class="rec-card">
      <div class="rec-card-header">${catEmojis[cat]} ${catNames[cat]}</div>`;
    foods.forEach(f=>{
      const isEaten = eaten.has(f.name);
      html += `<div class="rec-food-item" style="${isEaten?'opacity:.5':''}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="rec-food-name">${f.name}${isEaten?' ✅ 已吃':''}</span>
          ${!isEaten?`<button class="btn btn-outline btn-sm" onclick="quickAddFromRec('${f.name}')">+ 记录</button>`:''}
        </div>
        <div class="rec-food-benefit">${f.benefits} · ${f.portion||''}</div>
        <div class="rec-food-tags">
          ${(f.defense||[]).map(d=>`<span style="background:${DEFENSE_COLORS[d]}18;color:${DEFENSE_COLORS[d]}">${DEFENSE_NAMES[d]}</span>`).join('')}
          ${(f.goals||[]).filter(g=>goals.includes(g)).map(g=>`<span style="background:#f0fdf4;color:#16a34a">🎯${GOAL_NAMES[g]}</span>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  // Personalized tip
  html += `
  <div class="tip-box">
    <strong>📌 今日饮食建议</strong><br>
    <div style="margin-top:6px">• BMI ${BMI}（${BMI_STATUS}），建议每日摄入约 ${DAILY_CAL_TARGET} kcal</div>
    <div>• 蛋白质目标：${(PROFILE.weight*1.2).toFixed(0)}g/天（体重×1.2）</div>
    <div>• 尽量覆盖五大防御系统，每天吃5种以上不同颜色的蔬果</div>
    ${BMI<18.5?'<div>• 偏瘦体质建议多吃坚果、牛油果等富含健康脂肪的食物</div>':''}
  </div>`;

  container.innerHTML = html;
}

function quickAddFromRec(name){
  // Add to the most appropriate meal based on time
  const hour = new Date().getHours();
  let mealId = 'snack';
  if(hour<10) mealId='breakfast';
  else if(hour<14) mealId='lunch';
  else if(hour<17) mealId='snack';
  else mealId='dinner';

  if(mealRecords[mealId].some(f=>f.name===name)) return;
  const nutr = FOOD_NUTRITION[name]||guessNutrition(name);
  mealRecords[mealId].push({name, nutrition:nutr});
  saveRecords();
  renderMealSections();
  renderRecommendations();
}

function simpleHash(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}
  return Math.abs(h);
}

init();
